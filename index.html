<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wave Rilla</title>
  <meta name="description" content="Ride the waves like a beast! A 3D jet ski racing game with dynamic water, power-ups, and AI opponents." />
  <meta property="og:title" content="Wave Rilla" />
  <meta property="og:description" content="Ride the waves like a beast! A 3D jet ski racing game with dynamic water, power-ups, and AI opponents." />
  <meta property="og:image" content="https://snozilla.github.io/waverilla/src/brand/og-image.webp" />
  <meta property="og:url" content="https://snozilla.github.io/waverilla/" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Wave Rilla" />
  <meta name="twitter:description" content="Ride the waves like a beast! A 3D jet ski racing game with dynamic water, power-ups, and AI opponents." />
  <meta name="twitter:image" content="https://snozilla.github.io/waverilla/src/brand/og-image.webp" />
  <link rel="stylesheet" href="styles/main.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="hud">
      <div id="hud-speed">
        <div id="speed-value">0</div>
        <div class="hud-unit">km/h</div>
      </div>
      <div id="hud-position">
        <div id="position-value">1</div>
        <div class="hud-label">/ 6</div>
      </div>
      <div id="hud-lap">
        <div id="lap-value">1 / 3</div>
      </div>
      <div id="hud-power">
        <div id="power-bar">
          <div class="power-seg" data-index="0"></div>
          <div class="power-seg" data-index="1"></div>
          <div class="power-seg" data-index="2"></div>
          <div class="power-seg" data-index="3"></div>
          <div class="power-seg" data-index="4"></div>
        </div>
      </div>
      <div id="hud-minimap">
        <canvas id="minimap-canvas" width="160" height="160"></canvas>
      </div>
      <div id="hud-pickup" class="hidden">
        <div id="pickup-label">TURBO</div>
        <div id="pickup-timer-bar"><div id="pickup-timer-fill"></div></div>
      </div>
    </div>
    <div id="touch-controls">
      <div id="joystick-zone">
        <div id="joystick-base"></div>
        <div id="joystick-thumb"></div>
      </div>
      <div id="touch-buttons">
        <div id="touch-buttons-col-left">
          <div class="touch-btn" id="touch-jump">JUMP</div>
          <div class="touch-btn" id="touch-tackle">HIT</div>
        </div>
        <div id="touch-buttons-col-right">
          <div class="touch-btn" id="touch-boost">BOOST</div>
        </div>
      </div>
      <div id="touch-pause">&#10074;&#10074;</div>
    </div>
    <div id="countdown-overlay"></div>
    <div id="results-overlay" class="hidden">
      <div id="results-content">
        <img src="src/brand/race-complete.png" alt="Race Complete!" id="race-complete-logo" />
        <div id="results-list"></div>
        <button id="restart-btn">BACK TO TRACKS</button>
      </div>
    </div>
    <div id="pause-overlay" class="hidden">
      <div id="pause-content">
        <img src="src/brand/paused.png" alt="Paused!" id="pause-logo" />
        <div id="controls-grid">
          <div class="control-row"><kbd>W</kbd> <kbd>&uarr;</kbd><span>Accelerate</span></div>
          <div class="control-row"><kbd>S</kbd> <kbd>&darr;</kbd><span>Reverse</span></div>
          <div class="control-row"><kbd>A</kbd> <kbd>D</kbd><span>Steer</span></div>
          <div class="control-row"><kbd>Shift</kbd><span>Boost</span></div>
          <div class="control-row"><kbd>Space</kbd><span>Jump</span></div>
          <div class="control-row"><kbd>X</kbd><span>Tackle</span></div>
          <div class="control-row"><kbd>Esc</kbd><span>Pause</span></div>
        </div>
        <div class="pause-slider-group">
          <label class="pause-label" for="sfx-volume">SFX Volume</label>
          <input type="range" id="sfx-volume" min="0" max="1" step="0.01" value="1" />
        </div>
        <div class="pause-slider-group">
          <label class="pause-label" for="music-volume">Music Volume</label>
          <input type="range" id="music-volume" min="0" max="1" step="0.01" value="1" />
        </div>
        <button id="resume-btn">RESUME</button>
        <button id="pause-restart-btn">BACK TO TRACKS</button>
      </div>
    </div>
    <div id="start-overlay">
      <div id="start-content">
        <img src="src/brand/rilla.png" alt="Wave Rilla" id="game-logo" />
        <p class="select-prompt">Select a Track</p>
        <div id="track-select">
          <div class="track-card" data-track-index="0">
            <canvas class="track-preview" width="80" height="80"></canvas>
            <div class="track-info">
              <div class="track-name">Tropical Loop</div>
              <span class="difficulty-badge easy">Easy</span>
            </div>
          </div>
          <div class="track-card" data-track-index="1">
            <canvas class="track-preview" width="80" height="80"></canvas>
            <div class="track-info">
              <div class="track-name">Shark Bay</div>
              <span class="difficulty-badge medium">Medium</span>
            </div>
          </div>
          <div class="track-card" data-track-index="2">
            <canvas class="track-preview" width="80" height="80"></canvas>
            <div class="track-info">
              <div class="track-name">Typhoon Run</div>
              <span class="difficulty-badge hard">Hard</span>
            </div>
          </div>
          <div class="track-card" data-track-index="3">
            <canvas class="track-preview" width="80" height="80"></canvas>
            <div class="track-info">
              <div class="track-name">Dragon's Wake</div>
              <span class="difficulty-badge expert">Expert</span>
            </div>
          </div>
        </div>
        <button id="credits-btn">CREDITS</button>
      </div>
    </div>
    <div id="credits-overlay" class="hidden">
      <div id="credits-content">
        <h2 id="credits-title">Credits</h2>
        <div id="credits-list">
          <div class="credit-row"><span class="credit-label">Music</span><span class="credit-value">Suno</span></div>
          <div class="credit-row"><span class="credit-label">Models</span><span class="credit-value">TBD</span></div>
          <div class="credit-row"><span class="credit-label">Voice</span><span class="credit-value">ElevenLabs</span></div>
        </div>
        <button id="credits-close-btn">BACK</button>
      </div>
    </div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
